<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roll Probability</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .control-section {
            margin-bottom: 30px;
        }
        
        .label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
            color: #333;
        }
        
        button:hover {
            border-color: #999;
            background: #f9f9f9;
        }
        
        button.active {
            background: #378ADD;
            color: white;
            border-color: #378ADD;
        }
        
        .chart-container {
            position: relative;
            height: 350px;
            margin-bottom: 30px;
        }
        
        .stats {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 600;
            color: #333;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .chart-container {
                height: 300px;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Dice Roll Probability</h1>
        <p class="subtitle">Visualize the probability distribution of dice outcomes</p>
        
        <div class="control-section">
            <label class="label">Number of dice</label>
            <div class="button-group">
                <button id="dice1" class="active">1 die</button>
                <button id="dice2">2 dice</button>
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="probChart"></canvas>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Expected Value</div>
                <div class="stat-value" id="expected">3.5</div>
            </div>
            <div class="stat">
                <div class="stat-label">Most Likely Outcome</div>
                <div class="stat-value" id="mode">1–6</div>
            </div>
        </div>
    </div>
    
    <script>
        let currentDice = 1;
        let chart = null;
        
        function calculateProbabilities(numDice) {
            const outcomes = {};
            
            if (numDice === 1) {
                for (let i = 1; i <= 6; i++) {
                    outcomes[i] = 1/6;
                }
            } else {
                for (let i = 1; i <= 6; i++) {
                    for (let j = 1; j <= 6; j++) {
                        const sum = i + j;
                        outcomes[sum] = (outcomes[sum] || 0) + 1;
                    }
                }
                const total = 36;
                for (let key in outcomes) {
                    outcomes[key] = outcomes[key] / total;
                }
            }
            
            return outcomes;
        }
        
        function getStats(outcomes) {
            let expected = 0;
            let maxProb = 0;
            const modes = [];
            
            for (let outcome in outcomes) {
                const prob = outcomes[outcome];
                expected += parseInt(outcome) * prob;
                
                if (prob > maxProb) {
                    maxProb = prob;
                    modes.length = 0;
                    modes.push(parseInt(outcome));
                } else if (prob === maxProb) {
                    modes.push(parseInt(outcome));
                }
            }
            
            return { 
                expected: expected.toFixed(2), 
                modes: modes.length > 1 ? modes[0] + '–' + modes[modes.length - 1] : modes[0] 
            };
        }
        
        function updateChart(numDice) {
            const outcomes = calculateProbabilities(numDice);
            const labels = Object.keys(outcomes).map(Number).sort((a,b) => a-b);
            const data = labels.map(label => (outcomes[label] * 100).toFixed(2));
            
            const stats = getStats(outcomes);
            document.getElementById('expected').textContent = stats.expected;
            document.getElementById('mode').textContent = stats.modes;
            
            const ctx = document.getElementById('probChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Probability (%)',
                        data: data,
                        backgroundColor: '#378ADD',
                        borderColor: '#185FA5',
                        borderWidth: 0.5,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: numDice === 1 ? 20 : 35,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            },
                            title: {
                                display: true,
                                text: 'Probability'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Sum of dice'
                            }
                        }
                    }
                }
            });
        }
        
        document.getElementById('dice1').addEventListener('click', () => {
            currentDice = 1;
            document.getElementById('dice1').classList.add('active');
            document.getElementById('dice2').classList.remove('active');
            updateChart(1);
        });
        
        document.getElementById('dice2').addEventListener('click', () => {
            currentDice = 2;
            document.getElementById('dice2').classList.add('active');
            document.getElementById('dice1').classList.remove('active');
            updateChart(2);
        });
        
        // Initialize chart
        updateChart(1);
    </script>
</body>
</html>
