<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Distributions — Econ 378</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 820px;
    margin: 36px auto;
    padding: 0 24px 40px;
    background: #f5f6fa;
    color: #1e1e2e;
  }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 22px; }

  /* ── Panels ── */
  .panel {
    background: white;
    border-radius: 10px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    padding: 20px 22px 16px;
    margin-bottom: 18px;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
  }
  .panel-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ── Toggle ── */
  .toggle-group { display: flex; }
  .toggle-btn {
    padding: 7px 20px;
    border: 2px solid #2563eb;
    background: white;
    color: #2563eb;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.15s;
    outline: none;
  }
  .toggle-btn:first-child { border-radius: 7px 0 0 7px; border-right-width: 1px; }
  .toggle-btn:last-child  { border-radius: 0 7px 7px 0; border-left-width: 1px; }
  .toggle-btn.active      { background: #2563eb; color: white; }
  .toggle-btn:hover:not(.active) { background: #eff6ff; }

  /* ── Bottom panel controls ── */
  .sim-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .ctrl-label {
    font-size: 0.82rem;
    color: #888;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  select {
    padding: 7px 11px;
    border: 1.5px solid #d1d5db;
    border-radius: 7px;
    font-size: 0.9rem;
    background: white;
    color: #1e1e2e;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: #2563eb; }
  .roll-btn {
    padding: 7px 22px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    outline: none;
  }
  .roll-btn:hover  { background: #15803d; }
  .roll-btn:active { background: #166534; }

  /* ── Canvas ── */
  canvas { display: block; width: 100%; }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 18px;
    margin-top: 10px;
    font-size: 0.82rem;
    color: #555;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  /* ── Stats strip ── */
  .stats {
    display: flex;
    gap: 0;
    border-top: 1px solid #f0f0f5;
    margin-top: 14px;
  }
  .stat {
    flex: 1;
    padding: 12px 10px 0;
    text-align: center;
    border-right: 1px solid #f0f0f5;
  }
  .stat:last-child { border-right: none; }
  .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 3px; }
  .stat-value { font-size: 1.05rem; font-weight: 700; color: #1e1e2e; }
</style>
</head>
<body>

<h1>Dice Roll Distributions</h1>
<p class="subtitle">Econ 378 &mdash; Explore the probability distribution of dice outcomes.</p>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- TOP PANEL: Theoretical PDF of a single roll                              -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div class="panel">
  <div class="panel-header">
    <span class="panel-title">PDF &mdash; Single Roll</span>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn1" onclick="setDice(1)">1 Die</button>
      <button class="toggle-btn"        id="btn2" onclick="setDice(2)">2 Dice</button>
    </div>
  </div>
  <canvas id="pdfCanvas" height="240"></canvas>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- BOTTOM PANEL: Simulation — theoretical vs. realized                      -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div class="panel">
  <div class="panel-header">
    <span class="panel-title">Simulation</span>
    <div class="sim-controls">
      <div class="toggle-group">
        <button class="toggle-btn active" id="simBtn1" onclick="setSimDice(1)">1 Die</button>
        <button class="toggle-btn"        id="simBtn2" onclick="setSimDice(2)">2 Dice</button>
      </div>
      <span class="ctrl-label" style="margin-left:4px;">Rolls</span>
      <select id="nRolls" onchange="simulate()">
        <option value="1">1</option>
        <option value="10">10</option>
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="500">500</option>
        <option value="1000">1,000</option>
        <option value="10000">10,000</option>
        <option value="100000">100,000</option>
      </select>
      <button class="roll-btn" onclick="simulate()">Roll Again</button>
    </div>
  </div>
  <canvas id="simCanvas" height="300"></canvas>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:#3b82f6;"></div>
      Realized frequency
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:rgba(249,115,22,0.8);"></div>
      Theoretical probability
    </div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Rolls</div>
      <div class="stat-value" id="statN">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Realized Mean</div>
      <div class="stat-value" id="statMean">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Theoretical Mean</div>
      <div class="stat-value" id="statTheoMean">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Realized Std Dev</div>
      <div class="stat-value" id="statSD">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Theoretical Std Dev</div>
      <div class="stat-value" id="statTheoSD">—</div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let pdfDice = 1;  // controls top panel
let simDice = 1;  // controls bottom panel

// ── Helpers ────────────────────────────────────────────────────────────────────
function rollDie() { return Math.floor(Math.random() * 6) + 1; }

function getOutcomes(n) {
  const min = n === 1 ? 1 : 2;
  const max = n === 1 ? 6 : 12;
  const arr = [];
  for (let i = min; i <= max; i++) arr.push(i);
  return arr;
}

function theoreticalProbs(n) {
  const p = {};
  if (n === 1) {
    for (let i = 1; i <= 6; i++) p[i] = 1 / 6;
  } else {
    const ways = [0, 0, 1, 2, 3, 4, 5, 6, 5, 4, 3, 2, 1];
    for (let i = 2; i <= 12; i++) p[i] = ways[i] / 36;
  }
  return p;
}

function theoreticalMeanSD(n) {
  const mean = n === 1 ? 3.5 : 7.0;
  const sd   = n === 1 ? Math.sqrt(35 / 12) : Math.sqrt(35 / 6);
  return { mean, sd };
}

// ── Toggles ────────────────────────────────────────────────────────────────────
function setDice(n) {
  pdfDice = n;
  document.getElementById('btn1').classList.toggle('active', n === 1);
  document.getElementById('btn2').classList.toggle('active', n === 2);
  drawPDF();
}

function setSimDice(n) {
  simDice = n;
  document.getElementById('simBtn1').classList.toggle('active', n === 1);
  document.getElementById('simBtn2').classList.toggle('active', n === 2);
  simulate();
}

// ── Top panel: draw theoretical PDF ───────────────────────────────────────────
function drawPDF() {
  const canvas   = document.getElementById('pdfCanvas');
  const outcomes = getOutcomes(pdfDice);
  const probs    = theoreticalProbs(pdfDice);
  const color    = '#2563eb';

  setupCanvas(canvas, 240);
  const ctx = canvas.getContext('2d');
  const { W, H, padL, padR, padT, padB, chartW, chartH } = dims(canvas, 240);

  const maxP = Math.max(...outcomes.map(o => probs[o])) * 1.22;

  drawAxes(ctx, { W, H, padL, padR, padT, padB, chartW, chartH }, maxP, outcomes.length);

  // Bars
  const slotW = chartW / outcomes.length;
  const barW  = slotW * 0.55;

  outcomes.forEach((o, i) => {
    const x    = padL + i * slotW + (slotW - barW) / 2;
    const barH = (probs[o] / maxP) * chartH;
    const y    = padT + chartH - barH;

    ctx.fillStyle = color;
    ctx.fillRect(x, y, barW, barH);

    // Value label above bar
    ctx.fillStyle = '#374151';
    ctx.font = '11px Segoe UI, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    const label = pdfDice === 1
      ? '1/6'
      : (probs[o] * 36).toFixed(0) + '/36';
    ctx.fillText(label, x + barW / 2, y - 2);

    // X tick
    ctx.fillStyle = '#555';
    ctx.font = '12px Segoe UI, Arial, sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText(o, x + barW / 2, padT + chartH + 8);
  });

  // X-axis label
  xLabel(ctx, padL, chartW, padT, chartH, H,
    pdfDice === 1 ? 'Outcome (face value)' : 'Sum of Two Dice');
}

// ── Bottom panel: simulate and draw ───────────────────────────────────────────
function simulate() {
  const n        = parseInt(document.getElementById('nRolls').value);
  const outcomes = getOutcomes(simDice);
  const theoP    = theoreticalProbs(simDice);

  // Roll
  const counts = {};
  outcomes.forEach(o => (counts[o] = 0));
  let sum = 0, sumSq = 0;
  for (let i = 0; i < n; i++) {
    let v = rollDie();
    if (simDice === 2) v += rollDie();
    counts[v]++;
    sum   += v;
    sumSq += v * v;
  }

  // Observed probabilities
  const obsP = {};
  outcomes.forEach(o => (obsP[o] = counts[o] / n));

  // Stats
  const mean = sum / n;
  const sd   = Math.sqrt(sumSq / n - mean * mean);
  const theo = theoreticalMeanSD(simDice);

  document.getElementById('statN').textContent        = n.toLocaleString();
  document.getElementById('statMean').textContent     = mean.toFixed(3);
  document.getElementById('statTheoMean').textContent = theo.mean.toFixed(3);
  document.getElementById('statSD').textContent       = n > 1 ? sd.toFixed(3) : '—';
  document.getElementById('statTheoSD').textContent   = theo.sd.toFixed(3);

  drawSim(obsP, theoP, outcomes);
}

function drawSim(obsP, theoP, outcomes) {
  const canvas = document.getElementById('simCanvas');
  setupCanvas(canvas, 300);
  const ctx = canvas.getContext('2d');
  const { W, H, padL, padR, padT, padB, chartW, chartH } = dims(canvas, 300);

  const maxP = Math.max(
    ...outcomes.map(o => Math.max(obsP[o] || 0, theoP[o] || 0))
  ) * 1.18 || 1;

  drawAxes(ctx, { W, H, padL, padR, padT, padB, chartW, chartH }, maxP, outcomes.length);

  // Grouped bars: [observed | theoretical] per outcome
  const slotW  = chartW / outcomes.length;
  const gap    = slotW * 0.1;
  const barW   = (slotW - gap * 2) / 2;

  outcomes.forEach((o, i) => {
    const baseX = padL + i * slotW + gap;
    const baseY = padT + chartH;

    // Observed
    const obsH = ((obsP[o] || 0) / maxP) * chartH;
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(baseX, baseY - obsH, barW, obsH);

    // Theoretical
    const theoH = ((theoP[o] || 0) / maxP) * chartH;
    ctx.fillStyle = 'rgba(249,115,22,0.8)';
    ctx.fillRect(baseX + barW, baseY - theoH, barW, theoH);

    // X tick
    ctx.fillStyle = '#555';
    ctx.font = '12px Segoe UI, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(o, baseX + barW, baseY + 8);
  });

  xLabel(ctx, padL, chartW, padT, chartH, H,
    simDice === 1 ? 'Outcome (face value)' : 'Sum of Two Dice');
}

// ── Drawing utilities ──────────────────────────────────────────────────────────
function setupCanvas(canvas, cssH) {
  const cssW = canvas.parentElement.clientWidth - 44;
  canvas.width  = cssW * devicePixelRatio;
  canvas.height = cssH * devicePixelRatio;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

function dims(canvas, cssH) {
  const W    = parseInt(canvas.style.width);
  const H    = cssH;
  const padL = 56, padR = 16, padT = 20, padB = 46;
  return { W, H, padL, padR, padT, padB,
           chartW: W - padL - padR,
           chartH: H - padT - padB };
}

function drawAxes(ctx, { W, H, padL, padR, padT, padB, chartW, chartH }, maxP, numOutcomes) {
  const yTicks = 5;
  ctx.font = '11px Segoe UI, Arial, sans-serif';

  for (let i = 0; i <= yTicks; i++) {
    const p = (maxP * i) / yTicks;
    const y = padT + chartH - (p / maxP) * chartH;

    ctx.strokeStyle = i === 0 ? '#bbb' : '#ebebf0';
    ctx.lineWidth   = i === 0 ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + chartW, y);
    ctx.stroke();

    ctx.fillStyle    = '#aaa';
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText((p * 100).toFixed(1) + '%', padL - 6, y);
  }

  // Y-axis spine
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(padL, padT);
  ctx.lineTo(padL, padT + chartH);
  ctx.stroke();

  // Y-axis label
  ctx.save();
  ctx.translate(13, padT + chartH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = '#777';
  ctx.font         = '12px Segoe UI, Arial, sans-serif';
  ctx.fillText('Probability', 0, 0);
  ctx.restore();
}

function xLabel(ctx, padL, chartW, padT, chartH, H, text) {
  ctx.fillStyle    = '#666';
  ctx.font         = '12px Segoe UI, Arial, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(text, padL + chartW / 2, H - 2);
}

// ── Init ───────────────────────────────────────────────────────────────────────
drawPDF();
simulate();
window.addEventListener('resize', () => { drawPDF(); simulate(); });
</script>
</body>
</html>
